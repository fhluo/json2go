name: Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.27.0-rc.1'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Nushell
        run: |
          winget install -e --id=Nushell.Nushell --accept-source-agreements --accept-package-agreements
          "$env:LOCALAPPDATA\Programs\nu\bin" | Out-File -FilePath "$env:GITHUB_PATH" -Append

      - name: Set up Just
        uses: extractions/setup-just@v4

      - name: Setup
        run: just setup

      - name: Build
        run: just build

      - name: Test
        run: just test
