# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3

env:
  Path: "{{.PWD}}/app/build/tools/nsis/Bin;{{.PWD}}/app/build/tools/upx;{{.PATH}}"

includes:
  ui:
    taskfile: ./ui/Taskfile.yaml
    dir: ./ui
  app:
    taskfile: ./app/Taskfile.yaml
    dir: ./app

tasks:
  setup:wails:
    cmd: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

  setup:nsis:
    platforms: [windows]
    cmds:
      - winget install -e --id NSIS.NSIS --accept-source-agreements --accept-package-agreements
      - cmd: echo "C:\Program Files (x86)\NSIS\Bin" >> "$GITHUB_PATH"
        if: '[ "$GITHUB_ACTIONS" = "true" ]'

  setup:inno:
    platforms: [windows]
    cmds:
      - winget install -e --id JRSoftware.InnoSetup.7 --accept-source-agreements --accept-package-agreements
      - cmd: echo "C:\Program Files\Inno Setup 7" >> "$GITHUB_PATH"
        if: '[ "$GITHUB_ACTIONS" = "true" ]'

  setup:upx:
    platforms: [windows]
    cmds:
      - winget install -e --id UPX.UPX --accept-source-agreements --accept-package-agreements
      - cmd: echo "{{.LOCALAPPDATA}}\Microsoft\WinGet\Links" >> "$GITHUB_PATH"
        if: '[ "$GITHUB_ACTIONS" = "true" ]'

  setup:
    deps:
      - setup:wails
      - task: ui:install

  build-cli-windows:
    env:
      GOOS: windows
      GOARCH: amd64
    dir: cmd/json2go
    cmds:
      - go build -o ../../bin/json2go-cli_windows-amd64.exe

  build-cli:
    deps:
      - build-cli-windows

  build-wails:
    dir: app
    cmds:
#      - go run github.com/fhluo/tools/wails-build@latest --upx --path='./build/tools/upx' --nsis --path='./build/tools/nsis/Bin'
      - wails3 task build

  build:
    deps:
      - build-wails
      - build-cli

  package:
    dir: app
    deps:
      - setup:upx
      - setup:inno
    cmds:
      - wails3 task package

  dev:
    env:
      json2go_dev: true
      json2go_debug: true
    dir: app
    cmds:
      - wails3 task dev

  test:
    cmds:
      - go test -v ./...
