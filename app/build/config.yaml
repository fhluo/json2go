version: '3'

info:
  companyName: ""
  productName: "json2go"
  productIdentifier: "json2go"
  description: "Generate Go type definitions from JSON"
  copyright: "Copyright © 2022-2026 fhluo"
  comments: ""
  version: "0.5.3"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - ui
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: just build-wails
      type: blocking
    - cmd: just web-dev
      type: background
    - cmd: just run
      type: primary

fileAssociations:

other:
  - name: My Other Data
