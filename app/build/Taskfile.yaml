version: '3'

tasks:
  go:mod:tidy:
    summary: Runs `go mod tidy`
    internal: true
    run: once
    cmds:
      - go mod tidy

  install:frontend:deps:
    summary: Install frontend dependencies
    run: once
    cmd: just setup-web

  build:frontend:
    summary: Build the frontend project
    deps:
      - task: generate:bindings
    cmd: just web-build

  generate:bindings:
    summary: Generates bindings for the frontend
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "../ui/bindings/**/*"
    cmds:
      - wails3 generate bindings -d ../ui/bindings  -f '{{.BUILD_FLAGS}}' -ts -i -clean=true

  generate:icons:
    summary: Generates Windows `.ico` file from an image
    dir: build
    sources:
      - "appicon.png"
    generates:
      - "icons.ico"
    cmds:
      - wails3 generate icons -input appicon.png -windowsfilename windows/icons.ico

  dev:frontend:
    summary: Runs the frontend in development mode
    cmd: just web-dev

  update:build-assets:
    summary: Updates the build assets
    dir: build
    cmds:
      - wails3 update build-assets -name "{{.APP_NAME}}" -binaryname "{{.APP_NAME}}" -config config.yaml -dir .
